<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portafolio</title>
    <style>
        :root {
            --bg-1: #070a19;
            --bg-2: #291549;
            --card: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.14);
            --text: #e6e9ff;
            --muted: rgba(230, 233, 255, 0.7);
            --accent: #9b5cff;
            --accent-2: #6ae7ff;
            --shadow: rgba(0, 0, 0, 0.4);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: var(--text);
            background: radial-gradient(circle at top, rgba(155, 92, 255, 0.35), transparent 55%),
                linear-gradient(135deg, var(--bg-1), var(--bg-2));
            scroll-behavior: smooth;
        }

        header.hero {
            text-align: center;
            padding: 80px 20px 60px;
        }

        header.hero h1 {
            font-size: clamp(2.5rem, 5vw, 4rem);
            margin: 0;
            letter-spacing: 0.02em;
            text-shadow: 0 18px 28px rgba(0, 0, 0, 0.35);
        }

        header.hero p {
            margin: 20px auto 0;
            max-width: 720px;
            color: var(--muted);
            font-size: 1.1rem;
            line-height: 1.65;
        }

        main {
            width: min(1080px, 95%);
            margin: 0 auto 60px;
            display: grid;
            gap: 40px;
        }

        section {
            padding: 30px;
            border-radius: 18px;
            background: var(--card);
            border: 1px solid var(--border);
            box-shadow: 0 16px 30px var(--shadow);
            backdrop-filter: blur(14px);
        }

        section h2 {
            margin-top: 0;
            margin-bottom: 18px;
            font-size: 1.75rem;
            letter-spacing: 0.01em;
        }

        .hero-accent {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 6px 14px;
            border-radius: 999px;
            background: linear-gradient(135deg, rgba(155, 92, 255, 0.35), rgba(106, 231, 255, 0.25));
            font-weight: 600;
            color: var(--text);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .carousel {
            position: relative;
            overflow: hidden;
            border-radius: 14px;
            min-height: var(--carousel-height, 420px);
            padding: 16px;
            display: grid;
            place-items: center;
            background: rgba(0, 0, 0, 0.18);
            border: 1px solid rgba(255, 255, 255, 0.12);
        }

        .carousel img {
            max-width: 100%;
            max-height: calc(var(--carousel-height, 420px) - 32px);
            width: auto;
            height: auto;
            object-fit: contain;
            display: none;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .carousel--logos {
            --carousel-height: clamp(300px, 52vw, 520px);
        }

        .carousel--logos img {
            width: min(100%, 480px);
        }

        .carousel--flyers {
            --carousel-height: clamp(460px, 78vh, 760px);
        }

        .carousel--otros {
            --carousel-height: clamp(340px, 58vw, 620px);
        }

        .carousel--otros img {
            width: min(100%, 900px);
        }

        .carousel img.active {
            display: block;
            opacity: 1;
        }

        .controls {
            margin-top: 18px;
            display: flex;
            justify-content: center;
            gap: 12px;
        }

        .controls button {
            min-width: 44px;
            min-height: 44px;
            padding: 0 18px;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.16);
            background: rgba(255, 255, 255, 0.08);
            color: var(--text);
            font-size: 1.2rem;
            cursor: pointer;
            transition: transform 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
        }

        .controls button:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.25);
        }

        .controls button:focus-visible {
            outline: 2px solid rgba(155, 92, 255, 0.8);
            outline-offset: 3px;
        }
        
        .button-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 14px;
            justify-items: center;
        }

        footer {
            text-align: center;
            padding: 24px 0 40px;
            color: var(--muted);
            font-size: 0.95rem;
        }

        @media (max-width: 768px) {
            .carousel {
                padding: 12px;
            }

            .carousel img {
                max-height: calc(var(--carousel-height, 420px) - 24px);
            }

            .carousel--logos {
                --carousel-height: clamp(260px, 78vw, 420px);
            }

            .carousel--flyers {
                --carousel-height: clamp(430px, 78vh, 640px);
            }

            .carousel--otros {
                --carousel-height: clamp(320px, 72vw, 500px);
            }

            header.hero {
                padding: 60px 18px 50px;
            }

            section {
                padding: 24px;
            }
        }
    </style>
</head>
<body>

    <header class="hero">
        <span class="hero-accent">Portafolio UX/UI</span>
        <h1>Diseños publicitarios: Fatima</h1>
        <p>Explora ejemplos de logos, flyers y otros diseños. Más de 3 años de experiencia, trabajando para pequeñas y medianas empresas.</p>
    </header>

    <main>
        <!-- Carrusel Logos -->
        <section>
            <h2>Ejemplos de logos</h2>
            <div class="carousel carousel--logos" data-carousel="0">
                <img src="Logos/Logo.png" class="active" alt="Logo ejemplo 1">
                <img src="Logos/Sin título-2.png" alt="Logo ejemplo 2">
                <img src="Logos/Logo4.png" alt="Logo ejemplo 3">
                <img src="Logos/1.png" alt="Logo ejemplo 4">
                <img src="Logos/Diseño sin título.png" alt="Logo ejemplo 5">
            </div>
            <div class="controls">
                <button aria-label="Anterior" onclick="prevSlide(0)">◀</button>
                <button aria-label="Siguiente" onclick="nextSlide(0)">▶</button>
            </div>
        </section>

        <!-- Carrusel Flyers -->
        <section>
            <h2>Ejemplos de flyers</h2>
            <div class="carousel carousel--flyers" data-carousel="1">
                <img src="Flyer/1 (1).jpg" class="active" alt="Flyer ejemplo 1">
                <img src="Flyer/Instagram 2.png" alt="Flyer ejemplo 2">
                <img src="Flyer/Instagram.png" alt="Flyer ejemplo 3">
                <img src="Flyer/Texto.png" alt="Flyer ejemplo 4">
            </div>
            <div class="controls">
                <button aria-label="Anterior" onclick="prevSlide(1)">◀</button>
                <button aria-label="Siguiente" onclick="nextSlide(1)">▶</button>
            </div>
        </section>

        <!-- Carrusel Otros -->
        <section>
            <h2>Otros ejemplos</h2>
            <div class="carousel carousel--otros" data-carousel="2">
                <img src="Otros/Presentación.png" class="active" alt="Ejemplo presentación 1">
                <img src="Otros/Presentación 2.png" alt="Ejemplo presentación 2">
                <img src="Otros/Sin título.jpeg" alt="Ejemplo presentación 3">
                <img src="Otros/Captura de pantalla 2026-04-27 154923.png" alt="Ejemplo presentación 4">
                <img src="Otros/Historia Día de las Madres Álbum de Recortes Rosa.jpg" alt="Ejemplo presentación 5">
            </div>
            <div class="controls">
                <button aria-label="Anterior" onclick="prevSlide(2)">◀</button>
                <button aria-label="Siguiente" onclick="nextSlide(2)">▶</button>
            </div>
        </section>
    </main>

    <footer>
        © 2026 - Portafolio • Diseñado con estilo azul/púrpura y responsive
    </footer>

    <script>
        const indexes = [0, 0, 0];
        const intervalTime = 3600;

        function showSlide(carouselIndex) {
            const carousel = document.querySelectorAll('.carousel')[carouselIndex];
            const images = carousel.querySelectorAll('img');

            images.forEach(img => {
                img.classList.remove('active');
                img.style.opacity = 0;
            });

            images[indexes[carouselIndex]].classList.add('active');
            images[indexes[carouselIndex]].style.opacity = 1;
        }

        function nextSlide(carouselIndex) {
            const carousel = document.querySelectorAll('.carousel')[carouselIndex];
            const images = carousel.querySelectorAll('img');

            indexes[carouselIndex] = (indexes[carouselIndex] + 1) % images.length;
            showSlide(carouselIndex);
        }

        function prevSlide(carouselIndex) {
            const carousel = document.querySelectorAll('.carousel')[carouselIndex];
            const images = carousel.querySelectorAll('img');

            indexes[carouselIndex] = (indexes[carouselIndex] - 1 + images.length) % images.length;
            showSlide(carouselIndex);
        }

        // Reproduce automáticamente, con pausa al interactuar
        let autoPlay = null;

        function startAutoPlay() {
            if (autoPlay) return;
            autoPlay = setInterval(() => {
                nextSlide(0);
                nextSlide(1);
                nextSlide(2);
            }, intervalTime);
        }

        function stopAutoPlay() {
            if (!autoPlay) return;
            clearInterval(autoPlay);
            autoPlay = null;
        }

        startAutoPlay();

        document.querySelectorAll('.carousel').forEach(carousel => {
            carousel.addEventListener('mouseenter', stopAutoPlay);
            carousel.addEventListener('mouseleave', startAutoPlay);
        });
    </script>

</body>
</html>
